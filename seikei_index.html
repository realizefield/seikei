<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政治経済 GAMBA ─ 単元表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  /* 色合いは元のまま */
  --ink:#0f1923;--paper:#f2f0eb;--card:#fffefb;
  --gold:#c8972a;--gold2:#f0c040;--accent:#1a3a6b;
  --red:#c0392b;--green:#1a6b3a;--orange:#e67e22;
  --muted:#6b7a99;--border:#d8d3c8;
  --A:#27ae60;--B:#2980b9;--C:#e67e22;
  /* 参考indexのレイアウト変数 */
  --radius:16px;--radius-lg:22px;
  --shadow:0 4px 24px rgba(15,25,35,.08);
  --shadow-hover:0 8px 32px rgba(15,25,35,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.8;min-height:100vh}

/* ══ NAV ══ */
nav{
  position:sticky;top:0;z-index:400;
  background:rgba(255,255,255,.97);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(8px);
  box-shadow:0 2px 16px rgba(15,25,35,.1);
}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-mark{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),#2c5eb0);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff;
  box-shadow:0 2px 8px rgba(26,58,107,.3);
}
.nav-logo-text{line-height:1.25}
.nav-logo-name{font-size:.98em;font-weight:900;color:var(--ink);letter-spacing:.02em}
.nav-logo-sub{font-size:.62em;color:var(--muted);letter-spacing:.12em}
.streak-badge{
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,#fff8e6,#fff3cd);
  border:1px solid var(--gold);
  border-radius:50px;padding:6px 16px;
  box-shadow:0 2px 8px rgba(200,151,42,.15);
}
.streak-badge .flame{font-size:1.1em}
.streak-badge .days{font-size:.78em;font-weight:700;color:var(--gold)}

/* ══ HERO / サマリー ══ */
.hero{
  background:linear-gradient(135deg,var(--accent) 0%,#2c5eb0 55%,#3a7bd5 100%);
  padding:40px 24px 36px;
  color:#fff;
}
.hero-inner{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.hero-title-group{}
.hero-label{font-size:.7em;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.7;margin-bottom:6px}
.hero-title{font-size:clamp(20px,3.5vw,30px);font-weight:900;line-height:1.3;margin-bottom:6px}
.hero-title span{color:var(--gold2)}
.hero-sub{font-size:.85em;opacity:.8;line-height:1.7}

.hero-stats{display:flex;gap:6px;flex-wrap:wrap}
.hstat{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.25);
  border-radius:14px;padding:14px 20px;text-align:center;min-width:80px;
}
.hstat-num{font-size:1.6em;font-weight:900;color:var(--gold2);line-height:1}
.hstat-lbl{font-size:.62em;opacity:.75;margin-top:4px;letter-spacing:.05em}

/* プログレスバー */
.progress-wrap{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  border-radius:14px;padding:14px 20px;min-width:200px;
}
.progress-lbl{font-size:.7em;opacity:.75;margin-bottom:8px;letter-spacing:.06em}
.progress-bar-bg{background:rgba(255,255,255,.2);border-radius:20px;height:10px;overflow:hidden}
.progress-bar-fill{background:linear-gradient(90deg,var(--gold),var(--gold2));height:100%;border-radius:20px;transition:.6s}
.progress-pct{font-size:.8em;font-weight:700;color:var(--gold2);margin-top:5px;text-align:right}

/* ══ タブナビ ══ */
.tab-nav{
  background:rgba(255,255,255,.97);
  border-bottom:2px solid var(--border);
  padding:8px 20px;
  display:flex;gap:6px;flex-wrap:wrap;
  position:sticky;top:58px;z-index:300;
  backdrop-filter:blur(8px);
  box-shadow:0 2px 8px rgba(15,25,35,.04);
}
.tnav{
  font-family:'Noto Sans JP',sans-serif;
  font-size:.78em;font-weight:700;
  padding:7px 18px;border:2px solid var(--border);border-radius:50px;
  background:#fff;color:var(--muted);cursor:pointer;transition:.14s;letter-spacing:.04em;
}
.tnav:hover{border-color:var(--accent);color:var(--accent)}
.tnav.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ══ メイン ══ */
.main{max-width:920px;margin:0 auto;padding:28px 16px 100px}
.tab-sec{display:none}.tab-sec.on{display:block}

/* ══ セクション見出し ══ */
.sec-hdr{
  display:flex;align-items:center;gap:14px;
  margin-bottom:20px;padding-bottom:12px;
  border-bottom:2px solid var(--border);
}
.sec-label{font-size:.68em;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
.sec-title{font-family:'Noto Serif JP',serif;font-size:1.08em;font-weight:700;letter-spacing:.04em;color:var(--ink)}
.sec-note{
  margin-left:auto;font-size:.73em;font-weight:700;
  background:linear-gradient(135deg,#eef3ff,#e8f0fe);
  color:var(--accent);
  border:1px solid rgba(26,58,107,.18);
  padding:4px 12px;border-radius:50px;
}

/* ══ バッジエリア ══ */
.badge-sec{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 22px;
  margin-bottom:24px;box-shadow:var(--shadow);
}
.badge-sec-title{font-size:.72em;font-weight:700;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.badges{display:flex;flex-wrap:wrap;gap:10px}
.badge{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 14px;border-radius:12px;border:2px solid var(--border);
  background:var(--paper);min-width:76px;transition:.2s;
}
.badge.earned{
  border-color:var(--gold);
  background:linear-gradient(135deg,#fffbea,#fff8d0);
  box-shadow:0 4px 12px rgba(200,151,42,.2);
}
.badge.locked{opacity:.3;filter:grayscale(1)}
.badge-icon{font-size:1.6em}
.badge-name{font-size:.64em;font-weight:700;color:var(--ink);text-align:center;line-height:1.3}

/* ══ 単元カード ══ */
.unit-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:14px;overflow:hidden;
  box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;
}
.unit-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}

.unit-top{display:flex;align-items:center;gap:14px;padding:16px 20px 12px}

.unit-num{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),#2c5eb0);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:.84em;
  box-shadow:0 2px 8px rgba(26,58,107,.25);
}

.unit-title-wrap{flex:1;min-width:0}
.unit-title{font-size:.97em;font-weight:700;line-height:1.4;color:var(--ink)}
.unit-sub{font-size:.73em;color:var(--muted);margin-top:3px;line-height:1.5}

.unit-meta-col{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.unit-step-badge{
  font-size:.65em;padding:4px 10px;border-radius:50px;font-weight:700;white-space:nowrap;
  background:var(--paper);color:var(--muted);border:1px solid var(--border);
}
.unit-step-badge.done{background:#d4f5e2;color:var(--green);border-color:var(--green)}
.unit-step-badge.partial{background:#fff3cd;color:#856404;border-color:#ffc107}
.open-badge{
  font-size:.62em;padding:3px 9px;border-radius:50px;font-weight:700;
}
.open-badge.open{background:#d4f5e2;color:var(--green);border:1px solid var(--green)}
.open-badge.soon{background:var(--paper);color:var(--muted);border:1px solid var(--border)}

/* 理解度ボタン行 */
.abc-row{
  display:flex;gap:8px;padding:0 20px 12px;align-items:center;flex-wrap:wrap;
}
.abc-lbl{font-size:.68em;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-right:2px}
.abc-btn{
  height:32px;padding:0 14px;border:2px solid var(--border);border-radius:50px;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.8em;
  background:#fff;color:var(--muted);cursor:pointer;transition:.15s;letter-spacing:.04em;
}
.abc-btn:hover{border-color:var(--muted);transform:translateY(-1px)}
.abc-btn.A{background:var(--A);color:#fff;border-color:var(--A);box-shadow:0 2px 8px rgba(39,174,96,.25)}
.abc-btn.B{background:var(--B);color:#fff;border-color:var(--B);box-shadow:0 2px 8px rgba(41,128,185,.25)}
.abc-btn.C{background:var(--C);color:#fff;border-color:var(--C);box-shadow:0 2px 8px rgba(230,126,34,.25)}
.abc-hint{font-size:.67em;color:var(--muted);margin-left:4px}

/* 統計行 */
.stat-row{display:flex;gap:14px;padding:0 20px 12px;align-items:center;flex-wrap:wrap}
.stat-item{display:flex;align-items:center;gap:4px;font-size:.72em;color:var(--muted)}
.stat-val{font-weight:700;color:var(--ink)}
.rdots{display:flex;gap:3px;align-items:center}
.rdot{width:9px;height:9px;border-radius:50%;background:var(--border)}
.rdot.done{background:var(--gold)}
.rdot.done.perf{background:var(--green)}

/* リンクボタン行 */
.link-row{display:flex;gap:8px;padding:0 20px 16px;flex-wrap:wrap}
.plink{
  text-decoration:none;font-family:'Noto Sans JP',sans-serif;
  font-size:.8em;font-weight:700;padding:9px 20px;border-radius:50px;
  border:2px solid var(--border);color:var(--ink);background:#fff;
  transition:.14s;display:inline-flex;align-items:center;gap:6px;
}
.plink:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,25,35,.12)}
.plink.go{
  background:linear-gradient(135deg,var(--accent),#2c5eb0);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(26,58,107,.25);
}
.plink.go:hover{box-shadow:0 6px 20px rgba(26,58,107,.35)}
.plink.fc{
  background:linear-gradient(135deg,var(--green),#1a8a46);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(26,107,58,.25);
}
.plink.fc:hover{box-shadow:0 6px 20px rgba(26,107,58,.35)}

/* ══ 学習記録タブ ══ */
.record-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 22px;
  margin-bottom:20px;box-shadow:var(--shadow);
}
.record-card-title{font-size:.72em;font-weight:700;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}

.prog-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.prog-row:last-child{border-bottom:none}
.prog-num{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),#2c5eb0);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:.72em;font-weight:700;
}
.prog-title{flex:1;font-size:.88em;font-weight:700;color:var(--ink)}
.prog-grade{
  font-size:.73em;font-weight:700;padding:3px 10px;border-radius:50px;
  background:var(--paper);color:var(--muted);border:1px solid var(--border);
}
.prog-grade.A{background:var(--A);color:#fff;border-color:var(--A)}
.prog-grade.B{background:var(--B);color:#fff;border-color:var(--B)}
.prog-grade.C{background:var(--C);color:#fff;border-color:var(--C)}
.prog-meta{font-size:.68em;color:var(--muted);white-space:nowrap}

/* カレンダー */
.cal-grid{display:flex;flex-wrap:wrap;gap:4px}
.cal-day{width:15px;height:15px;border-radius:4px;background:var(--border)}
.cal-day.s1{background:#c6e48b}.cal-day.s2{background:#7bc96f}
.cal-day.s3{background:#239a3b}.cal-day.s4{background:#196127}
.cal-lbl{display:flex;gap:5px;align-items:center;margin-top:10px;font-size:.68em;color:var(--muted)}
.cld{width:11px;height:11px;border-radius:3px}

/* ══ 達成モーダル ══ */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:900;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal-box{
  background:#fff;border-radius:var(--radius-lg);padding:36px 40px;
  text-align:center;max-width:340px;width:90%;
  box-shadow:0 16px 56px rgba(0,0,0,.25);
  position:relative;overflow:hidden;
}
.modal-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
}
.modal-emoji{font-size:3em;margin-bottom:12px}
.modal-title{font-size:1.2em;font-weight:900;margin-bottom:8px;color:var(--ink)}
.modal-sub{font-size:.87em;color:var(--muted);margin-bottom:22px;line-height:1.6}
.modal-close{
  font-family:'Noto Sans JP',sans-serif;font-size:.9em;font-weight:700;
  background:linear-gradient(135deg,var(--accent),#2c5eb0);
  color:#fff;border:none;border-radius:50px;padding:11px 32px;cursor:pointer;
  box-shadow:0 4px 14px rgba(26,58,107,.25);transition:.15s;
}
.modal-close:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,58,107,.35)}

#cnv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* ══ レスポンシブ ══ */
@media(max-width:640px){
  .hero-inner{flex-direction:column;gap:20px}
  .hero-stats{gap:6px}
  .hstat{padding:11px 14px;min-width:66px}
  .hstat-num{font-size:1.35em}
  .unit-top{padding:13px 14px 10px}
  .abc-row,.stat-row,.link-row{padding-left:14px;padding-right:14px}
  .abc-hint{display:none}
}
</style>
</head>
<body>

<canvas id="cnv"></canvas>

<!-- ══ NAV ══ -->
<nav>
  <a class="nav-logo" href="#">
    <div class="nav-logo-mark">政</div>
    <div class="nav-logo-text">
      <div class="nav-logo-name">政治経済 GAMBA</div>
      <div class="nav-logo-sub">完全習得システム</div>
    </div>
  </a>
  <div class="streak-badge">
    <span class="flame">🔥</span>
    <span class="days" id="streakDisp">0日連続</span>

</nav>

<!-- ══ HERO / サマリー ══ -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-title-group">
      <div class="hero-label">政治経済 全18単元</div>

        <div class="hstat-num" style="color:#4be890" id="sumA">0</div>
        <div class="hstat-lbl">理解A</div>

      <div class="hstat">
        <div class="hstat-num" style="color:#6bb5ff" id="sumB">0</div>
        <div class="hstat-lbl">理解B</div>
      </div>
      <div class="hstat">
        <div class="hstat-num" style="color:#ffb347" id="sumC">0</div>
        <div class="hstat-lbl">理解C</div>

      <div class="progress-wrap">
        <div class="progress-lbl">習熟度（公開済み単元）</div>

      </div>
    </div>
  </div>
</div>

<!-- ══ タブナビ ══ -->
<div class="tab-nav">
  <button class="tnav on" onclick="switchTab('tab-units',this)">📋 単元表</button>
  <button class="tnav"    onclick="switchTab('tab-record',this)">📅 学習記録</button>
</div>

<div class="main">

<!-- 単元表タブ -->
<div class="tab-sec on" id="tab-units">

  <div class="badge-sec">
    <div class="badge-sec-title">🏅 達成バッジ</div>
    <div class="badges" id="badgeArea"></div>
  </div>

  <div class="sec-hdr">
    <div>
      <div class="sec-label">Unit List</div>
      <div class="sec-title">政治経済　全18単元</div>
    </div>
    <div class="sec-note" id="secNote"></div>
  </div>

  <div id="cardsWrap"></div>

</div>

<!-- 学習記録タブ -->
<div class="tab-sec" id="tab-record">

  <div class="record-card">
    <div class="record-card-title">📊 単元別　理解度一覧</div>
    <div id="progList"></div>
  </div>

  <div class="record-card">
    <div class="record-card-title">📅 学習カレンダー（過去84日）</div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-lbl">
      <span>少</span>
      <div class="cld" style="background:var(--border)"></div>
      <div class="cld cal-day s1"></div>
      <div class="cld cal-day s2"></div>
      <div class="cld cal-day s3"></div>
      <div class="cld cal-day s4"></div>
      <span>多</span>
    </div>
  </div>

</div>

</div><!-- /main -->

<!-- 達成モーダル -->
<div class="modal-ov" id="achieveModal">
  <div class="modal-box">
    <div class="modal-emoji" id="achEmoji">🎉</div>
    <div class="modal-title" id="achTitle">達成！</div>
    <div class="modal-sub"   id="achSub"></div>
    <button class="modal-close" onclick="closeAchieve()">とじる</button>
  </div>
</div>

  {id:'sk14', num:'⑭', title:'裁判所(2)',              sub:'違憲審査制・国民の司法参加・司法改革・再審', file:'seikei14.html'},
  {id:'sk15', num:'⑮', title:'地方自治',               sub:'本旨・直接請求・住民投票・三位一体改革・地方財政', file:'seikei15.html'},
  {id:'sk16', num:'⑯', title:'選挙と政党(1)',          sub:'選挙制度・議員定数不均衡・選挙のルール・政治資金・政党', file:'seikei16.html'},
  {id:'sk17', num:'⑰', title:'選挙と政党(2)',          sub:'政党政治の形態・圧力団体・55年体制・行政国家・行政改革', file:'seikei17.html'},
  {id:'sk18', num:'⑱', title:'国際連合',               sub:'国際社会の成立・国際法・国連の機構・安保理・PKO・専門機関', file:'seikei18.html'},
];

/* ── バッジ定義 ── */
const BADGES = [
  {id:'first',  icon:'🌱', name:'初回学習',   cond: d => UNITS.some(u => getCount(d,u.id) > 0)},
  {id:'study3', icon:'📖', name:'3単元学習',  cond: d => UNITS.filter(u => getCount(d,u.id) > 0).length >= 3},
  {id:'study14',icon:'📚', name:'全単元学習', cond: d => UNITS.every(u => getCount(d,u.id) > 0)},
  {id:'c5',     icon:'✨', name:'C評価5単元', cond: d => UNITS.filter(u => getGrade(d,u.id)==='C').length >= 5},
  {id:'b7',     icon:'⭐', name:'B評価7単元', cond: d => UNITS.filter(u => getGrade(d,u.id)==='B').length >= 7},
  {id:'a5',     icon:'🥉', name:'A評価5単元', cond: d => UNITS.filter(u => getGrade(d,u.id)==='A').length >= 5},
  {id:'a10',    icon:'🥇', name:'A評価10単元',cond: d => UNITS.filter(u => getGrade(d,u.id)==='A').length >= 10},
  {id:'allA',   icon:'🏆', name:'全単元Ａ！', cond: d => UNITS.every(u => getGrade(d,u.id)==='A')},
  {id:'str3',   icon:'🔥', name:'3日連続',    cond: _ => getStreak() >= 3},
  {id:'str7',   icon:'💫', name:'7日連続',    cond: _ => getStreak() >= 7},
  {id:'str14',  icon:'🌟', name:'14日連続',   cond: _ => getStreak() >= 14},
];

/* ── LocalStorage ── */
const LS_KEY   = 'seikei_gamba_v1';
const LS_CAL   = 'seikei_cal_v1';
const LS_BADGE = 'seikei_badges_v1';

function loadData()      { try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch(e){return{}} }
function saveData(d)     { try{localStorage.setItem(LS_KEY,JSON.stringify(d))}catch(e){} }
function getGrade(d,id)  { return(d[id]||{}).grade||'' }
function getCount(d,id)  { return(d[id]||{}).count||0 }
function getLast(d,id)   { return(d[id]||{}).last||'' }

function setGrade(btn) {
  const id=btn.dataset.id, grade=btn.dataset.grade;
  const d=loadData();
  if(!d[id]) d[id]={};
  d[id].grade = (d[id].grade===grade) ? '' : grade;
  d[id].count = (d[id].count||0) + 1;
  d[id].last  = new Date().toISOString().slice(0,10);
  saveData(d);
  recordCal();
  render();
  checkBadges(d);
}

function recordCal() {
  try{
    const cal=JSON.parse(localStorage.getItem(LS_CAL)||'{}');
    const today=new Date().toISOString().slice(0,10);
    cal[today]=(cal[today]||0)+1;
    localStorage.setItem(LS_CAL,JSON.stringify(cal));
  }catch(e){}
}

function getStreak() {
  try{
    const cal=JSON.parse(localStorage.getItem(LS_CAL)||'{}');
    let s=0;
    for(let i=0;i<365;i++){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      if(cal[k]>0) s++; else if(i>0) break;
    }
    return s;
  }catch(e){return 0}
}

/* ── 完成済み単元 ── */
const DONE_FILES = ['seikei01.html','seikei02.html','seikei03.html','seikei04.html','seikei05.html','seikei06.html','seikei07.html','seikei08.html','seikei09.html','seikei10.html','seikei11.html','seikei12.html','seikei13.html','seikei14.html','seikei15.html','seikei16.html','seikei17.html','seikei18.html'];

/* ── カード生成 ── */
function buildCards() {
  const wrap = document.getElementById('cardsWrap');
  wrap.innerHTML = UNITS.map(u => {
    const done = DONE_FILES.includes(u.file);
    return `
  <div class="unit-card" id="uc-${u.id}">
    <div class="unit-top">
      <div class="unit-num">${u.num}</div>
      <div class="unit-title-wrap">
        <div class="unit-title">${u.title}</div>
        <div class="unit-sub">${u.sub}</div>
      </div>
      <div class="unit-meta-col">
        <div class="unit-step-badge" id="badge-${u.id}">未学習</div>
        <span class="open-badge ${done?'open':'soon'}">${done?'✅ 公開中':'🔜 準備中'}</span>
      </div>
    </div>
    <div class="abc-row">
      <span class="abc-lbl">理解度</span>
      <button class="abc-btn" data-id="${u.id}" data-grade="A" onclick="setGrade(this)" ${done?'':'disabled'}>A</button>
      <button class="abc-btn" data-id="${u.id}" data-grade="B" onclick="setGrade(this)" ${done?'':'disabled'}>B</button>
      <button class="abc-btn" data-id="${u.id}" data-grade="C" onclick="setGrade(this)" ${done?'':'disabled'}>C</button>
      <span class="abc-hint">A=完璧　B=良好　C=要復習</span>
    </div>
    <div class="stat-row">
      <div class="stat-item">学習回数：<span class="stat-val" id="cnt-${u.id}">0</span>回</div>
      <div class="rdots" id="dots-${u.id}"></div>
      <div class="stat-item">最終：<span class="stat-val" id="last-${u.id}">─</span></div>
    </div>
    <div class="link-row">
      ${done
        ? `<a class="plink go" href="${u.file}">📖 学習する</a>
           <a class="plink fc" href="${u.file}">⚡ フラッシュカード</a>`
        : `<span class="plink" style="opacity:.4;cursor:default;">📖 準備中</span>`
      }
    </div>
  </div>`;
  }).join('');
}

/* ── ドット描画 ── */
function renderDots(id,cnt,grade) {
  const el=document.getElementById('dots-'+id);
  if(!el) return;
  const max=7;
  let html='';
  for(let i=0;i<max;i++){
    const done=i<cnt;
    const cls=done?(grade==='A'?'done perf':'done'):'';
    html+=`<div class="rdot ${cls}"></div>`;
  }
  if(cnt>max) html+=`<span style="font-size:.68em;color:var(--muted);margin-left:2px">+${cnt-max}</span>`;
  el.innerHTML=html;
}

/* ── メインレンダリング ── */
function render() {
  const d=loadData();
  let cntA=0,cntB=0,cntC=0,total=0;

  UNITS.forEach(u=>{
    const grade=getGrade(d,u.id);
    const cnt  =getCount(d,u.id);
    const last =getLast(d,u.id);
    total+=cnt;
    if(grade==='A') cntA++;
    else if(grade==='B') cntB++;
    else if(grade==='C') cntC++;

    document.querySelectorAll(`[data-id="${u.id}"]`).forEach(btn=>{
      btn.className='abc-btn'+(grade===btn.dataset.grade?' '+grade:'');
    });

    const ce=document.getElementById('cnt-'+u.id);  if(ce) ce.textContent=cnt;
    const le=document.getElementById('last-'+u.id); if(le) le.textContent=last||'─';
    renderDots(u.id,cnt,grade);

    const card=document.getElementById('uc-'+u.id);
    if(card) card.style.borderLeft=grade?`4px solid var(--${grade})`:grade===''?'':'';

    const sb=document.getElementById('badge-'+u.id);
    if(sb){
      if(!grade&&cnt===0){ sb.textContent='未学習';    sb.className='unit-step-badge'; }
      else if(grade==='A'){ sb.textContent='✅ 完璧';  sb.className='unit-step-badge done'; }
      else if(grade==='B'){ sb.textContent='📘 良好';  sb.className='unit-step-badge partial'; }
      else if(grade==='C'){ sb.textContent='📌 要復習';sb.className='unit-step-badge partial'; }
      else if(cnt>0)       { sb.textContent='学習中';  sb.className='unit-step-badge partial'; }
    }
  });

  document.getElementById('sumTotal').textContent=total;
  document.getElementById('sumA').textContent=cntA;
  document.getElementById('sumB').textContent=cntB;
  document.getElementById('sumC').textContent=cntC;

  const doneUnits = UNITS.filter(u => DONE_FILES.includes(u.file));
  const pct = doneUnits.length === 0 ? 0 : Math.round(
    doneUnits.reduce((s,u)=>{
      const g=getGrade(d,u.id);
      return s+(g==='A'?100:g==='B'?60:g==='C'?30:0);
    },0) / doneUnits.length
  );
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';

  const chk=doneUnits.filter(u=>getGrade(d,u.id)==='A').length;
  document.getElementById('secNote').textContent=`A評価 ${chk} / ${doneUnits.length} 単元`;

  document.getElementById('streakDisp').textContent=getStreak()+'日連続';

  renderBadges(d);
  renderCalendar();
  renderProgList(d);
}

/* ── 進捗一覧 ── */
function renderProgList(d) {
  const list=document.getElementById('progList');
  if(!list) return;
  list.innerHTML=UNITS.map(u=>{
    const grade=getGrade(d,u.id);
    const cnt  =getCount(d,u.id);
    const last =getLast(d,u.id);
    const done =DONE_FILES.includes(u.file);
    return `
    <div class="prog-row">
      <div class="prog-num">${u.num}</div>
      <div class="prog-title">${u.title}</div>
      <span class="prog-grade ${grade}">${grade||'─'}</span>
      <span class="prog-meta">${cnt}回　${last||'─'}</span>
      ${done ? '' : '<span style="font-size:.65em;color:var(--muted);margin-left:4px">🔜</span>'}
    </div>`;
  }).join('');
}

/* ── バッジ ── */
function renderBadges(d) {
  const area=document.getElementById('badgeArea');
  area.innerHTML=BADGES.map(b=>{
    const earned=b.cond(d);
    return `<div class="badge ${earned?'earned':'locked'}" title="${b.name}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');
}

function checkBadges(d) {
  const prev=JSON.parse(localStorage.getItem(LS_BADGE)||'[]');
  BADGES.forEach(b=>{
    if(!prev.includes(b.id)&&b.cond(d)){
      prev.push(b.id);
      localStorage.setItem(LS_BADGE,JSON.stringify(prev));
      showAchieve(b.icon, b.name+' を獲得！', 'おめでとうございます！🎊');
    }
  });
}

/* ── カレンダー ── */
function renderCalendar() {
  const cal=JSON.parse(localStorage.getItem(LS_CAL)||'{}');
  const grid=document.getElementById('calGrid');
  let html='';
  for(let i=83;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const v=cal[k]||0;
    const cls=v>=4?'s4':v>=3?'s3':v>=2?'s2':v>=1?'s1':'';
    html+=`<div class="cal-day ${cls}" title="${k}：${v}回"></div>`;
  }
  grid.innerHTML=html;
}

/* ── タブ切替 ── */
function switchTab(id,btn) {
  document.querySelectorAll('.tab-sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.tnav').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  window.scrollTo(0,0);
}

/* ── 達成モーダル ── */
function showAchieve(emoji,title,sub) {
  document.getElementById('achEmoji').textContent=emoji;
  document.getElementById('achTitle').textContent=title;
  document.getElementById('achSub').textContent=sub;
  document.getElementById('achieveModal').classList.add('open');
  startConf();
  setTimeout(stopConf,4000);
}
function closeAchieve() {
  document.getElementById('achieveModal').classList.remove('open');
  stopConf();
}

/* ── 紙吹雪 ── */
const cv=document.getElementById('cnv');
const cx=cv.getContext('2d');
let pts=[],raf=null;
function startConf(){
  cv.width=innerWidth;cv.height=innerHeight;pts=[];
  for(let i=0;i<200;i++) pts.push({
    x:Math.random()*cv.width,
    y:Math.random()*cv.height-cv.height,
    s:Math.random()*10+4,
    c:`hsl(${Math.random()*360},70%,62%)`,
    sp:Math.random()*3+2,
    r:Math.random()*Math.PI*2,
    dr:.05
  });
  af();
}
function af(){
  cx.clearRect(0,0,cv.width,cv.height);
  pts.forEach(p=>{
    p.y+=p.sp;p.r+=p.dr;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);
    cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);
    cx.restore();
    if(p.y>cv.height)p.y=-20;
  });
  raf=requestAnimationFrame(af);
}
function stopConf(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  cx.clearRect(0,0,cv.width,cv.height);pts=[];
}

/* ── 初期化 ── */
buildCards();
render();
</script>
